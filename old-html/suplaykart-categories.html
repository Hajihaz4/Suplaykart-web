<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Suplaykart – Categories</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#0C831F;--green-lt:#E8F5E9;
  --dark:#1C1C1C;--gray:#6B6B6B;
  --light:#F2F2F2;--border:#EBEBEB;
  --white:#fff;--red:#E23744;
  --font:'Poppins',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#2a2a2a;font-family:var(--font)}

/* ── SHELL ───────────────────────────────────── */
.shell{
  max-width:390px;height:100vh;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--light);box-shadow:0 0 60px rgba(0,0,0,.6);
}

/* ── TOP BAR ─────────────────────────────────── */
.topbar{
  background:white;padding:44px 16px 10px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.topbar-title{flex:1;font-size:18px;font-weight:900;color:var(--dark);letter-spacing:-.3px}
.topbar-icon{
  width:36px;height:36px;border-radius:50%;background:var(--light);
  display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;
}
.topbar-icon svg{width:20px;height:20px;fill:var(--dark)}
.t-badge{
  position:absolute;top:-2px;right:-2px;
  background:var(--red);color:white;font-family:var(--font);
  font-size:8px;font-weight:800;min-width:15px;height:15px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  padding:0 3px;border:1.5px solid white;
}

/* ── SEARCH ──────────────────────────────────── */
.srch-wrap{
  background:white;padding:8px 16px 10px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.srch-bar{
  display:flex;align-items:center;gap:9px;
  background:var(--light);border-radius:12px;padding:10px 14px;
}
.srch-bar input{flex:1;border:none;outline:none;font-family:var(--font);font-size:14px;color:var(--dark);background:transparent}
.srch-bar input::placeholder{color:#ABABAB}
.si{fill:#9E9E9E;flex-shrink:0;width:17px;height:17px}

/* ── TWO-COLUMN LAYOUT ───────────────────────── */
.body-area{flex:1;display:flex;overflow:hidden}

/* ── LEFT SIDEBAR ────────────────────────────── */
.sidebar{
  width:54px;background:white;
  border-right:1px solid var(--border);
  overflow-y:auto;scrollbar-width:none;flex-shrink:0;
}
.sidebar::-webkit-scrollbar{display:none}

.sb-item{
  display:flex;flex-direction:column;align-items:center;
  padding:12px 4px 10px;cursor:pointer;position:relative;
  border-left:3px solid transparent;
  transition:all .2s;
}
.sb-item::after{
  content:'';position:absolute;bottom:0;left:8px;right:8px;
  height:1px;background:var(--border);
}
.sb-item:last-child::after{display:none}
.sb-item.active{border-left-color:var(--green);background:#F3FFF5}
.sb-em{font-size:20px;line-height:1;margin-bottom:4px}
.sb-lbl{
  font-size:8px;font-weight:700;color:#AAAAAA;
  text-align:center;line-height:1.25;word-break:break-word;
}
.sb-item.active .sb-lbl{color:var(--green)}
.sb-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--green);margin-top:3px;
  opacity:0;transition:opacity .2s;
}
.sb-item.active .sb-dot{opacity:1}

/* ── RIGHT CONTENT ───────────────────────────── */
.content{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:16px}
.content::-webkit-scrollbar{display:none}

/* ── CATEGORY SECTION ────────────────────────── */
.cat-sec{background:white;margin-bottom:8px}
.cat-sec-hd{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 12px 10px;
}
.cat-sec-title{font-size:14px;font-weight:800;color:var(--dark);letter-spacing:-.2px}
.cat-sec-sub{font-size:10px;color:var(--gray);font-weight:500}

/* 4-per-row tile grid */
.tile-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:5px;padding:0 8px 12px;
}
.tile{
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;border-radius:10px;padding:4px 2px 6px;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.tile:active{background:rgba(0,0,0,.04)}
.tile-img{
  width:100%;aspect-ratio:1;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:5px;overflow:hidden;
  position:relative;
}
/* Arrow badge on hover/tap */
.tile-img::after{
  content:'›';
  position:absolute;bottom:3px;right:5px;
  font-size:12px;font-weight:800;color:rgba(0,0,0,.25);
}
.tile-name{
  font-size:9.5px;font-weight:600;color:var(--dark);
  text-align:center;line-height:1.3;
}

/* Tile background palette */
.bg1{background:#E1F0E4} .bg2{background:#FEF3E2}
.bg3{background:#E2ECFD} .bg4{background:#FEE5EA}
.bg5{background:#EEE5FD} .bg6{background:#E2F5FB}
.bg7{background:#FEF9E2} .bg8{background:#F0ECE6}
.bg9{background:#FDECEA} .bg10{background:#E8F5E9}
.bg11{background:#FFF3E0} .bg12{background:#E8EAF6}

/* ── STORES IN SPOTLIGHT ─────────────────────── */
.spot-sec{background:white;margin-bottom:8px}
.spot-scroll{overflow-x:auto;scrollbar-width:none;padding:0 10px 16px}
.spot-scroll::-webkit-scrollbar{display:none}
.spot-row{display:flex;gap:9px}
.spot-card{
  min-width:124px;height:96px;border-radius:14px;
  overflow:hidden;position:relative;cursor:pointer;flex-shrink:0;
}
.sp1{background:linear-gradient(135deg,#BBDEFB,#64B5F6)}
.sp2{background:linear-gradient(135deg,#F8BBD0,#F48FB1)}
.sp3{background:linear-gradient(135deg,#C8E6C9,#81C784)}
.sp4{background:linear-gradient(135deg,#FFE0B2,#FFAB40)}
.sp5{background:linear-gradient(135deg,#E1BEE7,#BA68C8)}
.sp6{background:linear-gradient(135deg,#B2EBF2,#4DD0E1)}
.spot-name{
  position:absolute;top:9px;left:10px;
  font-size:11px;font-weight:800;color:var(--dark);
  line-height:1.3;
}
.spot-em{
  position:absolute;bottom:7px;right:8px;
  font-size:34px;line-height:1;
}

/* ── BOTTOM NAV ──────────────────────────────── */
.bnav{
  flex-shrink:0;background:white;
  border-top:1px solid var(--border);
  display:flex;padding:8px 0 18px;
  box-shadow:0 -4px 20px rgba(0,0,0,.05);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:3px;cursor:pointer;
}
.nav-svg{width:22px;height:22px;fill:#9E9E9E;transition:all .2s}
.nav-item.active .nav-svg{fill:var(--green);transform:scale(1.1)}
.nav-item.nav-pick.active .nav-svg{fill:#FF6B00}
.nav-lbl{font-size:10px;font-weight:600;color:#9E9E9E}
.nav-item.active .nav-lbl{color:var(--green)}
.nav-item.nav-pick.active .nav-lbl{color:#FF6B00}

/* ── PRODUCT LISTING OVERLAY ─────────────────── */
.overlay{
  position:absolute;inset:0;background:white;
  z-index:200;display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.overlay.open{transform:translateX(0)}
.ov-head{
  padding:44px 16px 14px;background:white;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.ov-back{
  width:36px;height:36px;border-radius:50%;
  background:var(--light);display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.ov-back svg{width:20px;height:20px;fill:var(--dark)}
.ov-title{font-size:16px;font-weight:800;color:var(--dark);flex:1}
.ov-body{flex:1;overflow-y:auto;padding:16px}
.sub-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
}
.sub-card{
  border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;background:white;
  transition:transform .15s;
}
.sub-card:active{transform:scale(.96)}
.sub-img{
  height:80px;display:flex;align-items:center;justify-content:center;
  font-size:38px;
}
.sub-name{
  padding:6px 6px 8px;font-size:10px;font-weight:600;
  color:var(--dark);text-align:center;line-height:1.3;
}
.sub-count{font-size:9px;color:var(--gray);margin-top:1px}

/* ── SCROLL INDICATOR LINE (sidebar) ────────── */
.sb-progress{
  position:absolute;left:0;top:0;width:3px;
  background:var(--green);border-radius:0 3px 3px 0;
  transition:height .2s, top .2s;
  pointer-events:none;
}
</style>

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  const sb = document.getElementById('sidebar');
  const ct = document.getElementById('content');
  let sbHTML = '', ctHTML = '';

  SECTIONS.forEach((sec, i) => {
    // Sidebar item
    sbHTML += `
      <div class="sb-item${i===0?' active':''}" id="sb-${sec.id}" onclick="jumpTo('${sec.id}')">
        <div class="sb-em">${sec.em}</div>
        <div class="sb-lbl">${sec.label}</div>
        <div class="sb-dot"></div>
      </div>`;

    // Category section
    let tilesHTML = sec.items.map(it => `
      <div class="tile" onclick="openOverlay('${sec.title} › ${it.name}', ${JSON.stringify(it.subs).replace(/"/g,'&quot;')})">
        <div class="tile-img ${it.bg}">${it.em}</div>
        <div class="tile-name">${it.name}</div>
      </div>`).join('');

    ctHTML += `
      <div class="cat-sec" id="sec-${sec.id}" data-id="${sec.id}">
        <div class="cat-sec-hd">
          <div class="cat-sec-title">${sec.em} ${sec.title}</div>
          <div class="cat-sec-sub">${sec.count}</div>
        </div>
        <div class="tile-grid">${tilesHTML}</div>
      </div>`;
  });

  // Spotlight section
  sbHTML += `
    <div class="sb-item" id="sb-spotlight" onclick="jumpTo('spotlight')">
      <div class="sb-em">⭐</div>
      <div class="sb-lbl">Spotlight</div>
      <div class="sb-dot"></div>
    </div>`;

  let spotHTML = SPOTLIGHT.map(s => `
    <div class="spot-card ${s.cl}">
      <div class="spot-name">${s.name.replace('\n','<br>')}</div>
      <div class="spot-em">${s.em}</div>
    </div>`).join('');

  ctHTML += `
    <div class="cat-sec spot-sec" id="sec-spotlight" data-id="spotlight">
      <div class="cat-sec-hd">
        <div class="cat-sec-title">⭐ Stores in Spotlight</div>
        <div class="cat-sec-sub">Curated picks</div>
      </div>
      <div class="spot-scroll">
        <div class="spot-row">${spotHTML}</div>
      </div>
    </div>`;

  // Overlay placeholder (keeps it in DOM)
  ctHTML += `<div class="overlay" id="overlay">
    <div class="ov-head">
      <div class="ov-back" onclick="closeOverlay()">
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:#1C1C1C"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <div class="ov-title" id="ov-title">Category</div>
    </div>
    <div class="ov-body"><div class="sub-grid" id="sub-grid"></div></div>
  </div>`;

  sb.innerHTML = sbHTML;
  ct.innerHTML = ctHTML;
}

// ══════════════════════════════════════════════
// INTERSECTION OBSERVER → active sidebar
// ══════════════════════════════════════════════
function setupObserver() {
  const content = document.getElementById('content');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.1) {
        const id = entry.target.dataset.id;
        document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
        const sbItem = document.getElementById('sb-' + id);
        if (sbItem) {
          sbItem.classList.add('active');
          sbItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      }
    });
  }, {
    root: content,
    threshold: 0.15,
    rootMargin: '-20px 0px -60% 0px'
  });

  document.querySelectorAll('[data-id]').forEach(el => observer.observe(el));
}

// ══════════════════════════════════════════════
// JUMP TO SECTION
// ══════════════════════════════════════════════
function jumpTo(id) {
  const el = document.getElementById('sec-' + id);
  const content = document.getElementById('content');
  if (el) content.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
}

// ══════════════════════════════════════════════
// SUBCATEGORY OVERLAY
// ══════════════════════════════════════════════
function openOverlay(title, subs) {
  document.getElementById('ov-title').textContent = title;
  const grid = document.getElementById('sub-grid');
  grid.innerHTML = subs.map(s => `
    <div class="sub-card">
      <div class="sub-img ${s.c}">${s.e}</div>
      <div class="sub-name">${s.n}</div>
    </div>`).join('');
  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
}

// ══════════════════════════════════════════════
// SEARCH FILTER
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  render();
  setupObserver();

  document.getElementById('srchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    document.querySelectorAll('.cat-sec').forEach(sec => {
      if (!q) { sec.style.display = ''; return; }
      const title = sec.querySelector('.cat-sec-title').textContent.toLowerCase();
      const tiles = sec.querySelectorAll('.tile-name');
      let match = title.includes(q);
      tiles.forEach(t => { if (t.textContent.toLowerCase().includes(q)) match = true; });
      sec.style.display = match ? '' : 'none';
    });
  });
});

// ══════════════════════════════════════════════
// BOTTOM NAV
// ══════════════════════════════════════════════
function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
