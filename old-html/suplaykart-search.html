<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Suplaykart – Search</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#0C831F;--green-lt:#E8F5E9;
  --dark:#1C1C1C;--gray:#6B6B6B;
  --light:#F2F2F2;--border:#EBEBEB;
  --white:#fff;--red:#E23744;
  --cream:#FFFBE6;--cream-2:#FFF7CC;
  --font:'Poppins',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#2a2a2a;font-family:var(--font);overscroll-behavior:none}

.shell{
  max-width:390px;height:100vh;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--light);box-shadow:0 0 60px rgba(0,0,0,.6);
  position:relative;
}

/* ── SEARCH AREA (sticky top) ────────────────── */
.search-area{
  flex-shrink:0;
  background:white;
  position:relative;z-index:30;
  transition:background .25s;
}
.search-area.suggesting{
  background:linear-gradient(180deg,var(--cream) 0%,var(--cream-2) 100%);
}

.search-row{padding:44px 14px 10px;display:flex;align-items:center;gap:8px}
.s-back{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:background .15s;
}
.s-back:active{background:rgba(0,0,0,.06)}
.s-back svg{width:18px;height:18px;fill:var(--dark)}

.s-input-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:white;border-radius:30px;
  padding:9px 14px;
  box-shadow:0 1px 6px rgba(0,0,0,.06);
}
.search-area.suggesting .s-input-wrap{background:white;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.s-icon{width:16px;height:16px;fill:#9E9E9E;flex-shrink:0}
.s-input{
  flex:1;border:none;outline:none;
  font-family:var(--font);font-size:14px;color:var(--dark);
  background:transparent;font-weight:500;
}
.s-input::placeholder{color:#ABABAB}
.s-clear{
  width:18px;height:18px;border-radius:50%;
  background:#D9D9D9;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:white;font-size:11px;font-weight:700;
  flex-shrink:0;transition:opacity .2s;
  font-family:var(--font);
}
.s-clear.hide{opacity:0;pointer-events:none}
.s-divider{width:1px;height:18px;background:#D0D0D0;flex-shrink:0}
.s-mic{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}
.s-mic svg{width:18px;height:18px;fill:#9E9E9E}

/* ── SUGGESTIONS OVERLAY ─────────────────────── */
.suggestions{
  max-height:0;overflow:hidden;
  transition:max-height .35s cubic-bezier(.22,1,.36,1);
}
.search-area.suggesting .suggestions{max-height:360px}
.sugg-list{padding:4px 0 18px}
.sugg-item{
  display:flex;align-items:center;gap:14px;
  padding:9px 18px;cursor:pointer;
  transition:background .12s;
}
.sugg-item:active{background:rgba(0,0,0,.05)}
.sugg-img{
  width:40px;height:40px;border-radius:10px;
  background:white;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.sugg-text{font-size:15px;color:var(--dark);font-weight:400;flex:1;line-height:1.3}
.sugg-text strong{font-weight:700}
.sugg-arr{color:#9E9E9E;font-size:18px;margin-right:0;flex-shrink:0}

/* ── RECENT SEARCHES ─────────────────────────── */
.recent-block{padding:10px 18px 18px}
.recent-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.recent-title{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.recent-clear{font-size:11px;font-weight:700;color:var(--green);cursor:pointer}
.recent-pills{display:flex;flex-wrap:wrap;gap:6px}
.rpill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(0,0,0,.08);
  font-size:12px;font-weight:500;color:var(--dark);
  padding:6px 11px 6px 13px;border-radius:20px;
  cursor:pointer;transition:background .15s;
}
.rpill:active{background:rgba(255,255,255,1)}
.rpill svg{width:11px;height:11px;fill:var(--gray)}

/* ── FILTER PILLS BAR ────────────────────────── */
.filter-bar{
  flex-shrink:0;background:white;
  padding:10px 0 10px;
  border-bottom:1px solid var(--border);
  position:relative;z-index:20;
}
.filter-scroll{overflow-x:auto;scrollbar-width:none;padding:0 14px}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-row{display:flex;gap:8px;white-space:nowrap}

.fpill{
  display:inline-flex;align-items:center;gap:5px;
  background:white;border:1.5px solid var(--border);
  border-radius:20px;padding:6px 12px;
  font-size:12px;font-weight:600;color:var(--dark);
  cursor:pointer;transition:all .15s;white-space:nowrap;
  font-family:var(--font);
}
.fpill svg{width:11px;height:11px;fill:currentColor}
.fpill.active{
  background:var(--dark);border-color:var(--dark);color:white;
}
.fpill .fbadge{
  background:var(--green);color:white;
  font-size:9px;font-weight:800;
  min-width:14px;height:14px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;margin-left:2px;
}

/* ── MAIN SCROLL ─────────────────────────────── */
.main{flex:1;overflow-y:auto;scrollbar-width:none;background:var(--light)}
.main::-webkit-scrollbar{display:none}

.results-head{
  font-size:11px;color:var(--gray);font-weight:600;
  padding:12px 14px 6px;
}
.results-head strong{color:var(--dark);font-weight:800}

/* ── PRODUCT GRID ────────────────────────────── */
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 8px 8px}
.pcard{
  background:white;border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;
  position:relative;transition:transform .1s;
  display:flex;flex-direction:column;
}
.pcard:active{transform:scale(.97)}

.pcard-img{
  position:relative;background:#F7F7F7;
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.pcard-em{font-size:48px;line-height:1}

.veg-dot{
  position:absolute;bottom:5px;right:5px;
  width:14px;height:14px;border-radius:2px;
  border:1.5px solid var(--green);background:white;
  display:flex;align-items:center;justify-content:center;
}
.veg-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:block}

.wish{
  position:absolute;top:5px;left:5px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(255,255,255,.85);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;
}
.wish svg{width:13px;height:13px;fill:none;stroke:#9E9E9E;stroke-width:2;transition:all .2s}
.wish.on svg{fill:var(--red);stroke:var(--red)}

.ad-tag{
  position:absolute;top:5px;right:5px;
  background:rgba(0,0,0,.55);color:white;
  font-size:8px;font-weight:700;
  padding:1px 6px;border-radius:3px;letter-spacing:.5px;
  font-family:var(--font);
}

.img-bottom{
  position:absolute;bottom:0;left:0;right:0;
  padding:5px 6px 6px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(transparent,rgba(255,255,255,.95) 55%);
}
.pcard-wt{font-size:9px;font-weight:600;color:var(--gray)}
.add-btn{
  background:white;border:1.5px solid var(--green);color:var(--green);
  font-family:var(--font);font-size:10px;font-weight:800;
  padding:4px 10px;border-radius:7px;cursor:pointer;
  letter-spacing:.2px;transition:all .15s;flex-shrink:0;
}
.add-btn.added{background:var(--green);color:white}

.pcard-body{padding:6px 8px 9px;display:flex;flex-direction:column;flex:1}
.pcard-pkg{font-size:9px;color:var(--gray);font-weight:600;margin-bottom:1px}
.pcard-price-row{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap}
.pcard-price{
  font-size:14px;font-weight:800;color:var(--dark);
  background:#FFF8C4;padding:0 3px;border-radius:3px;
}
.pcard-price.no-bg{background:transparent;padding:0}
.pcard-og{font-size:10px;color:var(--gray);text-decoration:line-through}
.pcard-off{
  font-size:9px;color:#1565C0;font-weight:700;
  margin-top:1px;
}
.pcard-name{
  font-size:11px;color:var(--dark);font-weight:500;
  line-height:1.4;margin-top:3px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.pcard-tag{
  display:inline-block;
  font-size:8px;font-weight:700;
  background:#FFF3E0;color:#E65100;
  padding:2px 5px;border-radius:3px;
  margin-top:5px;align-self:flex-start;
}
.pcard-rating{display:flex;align-items:center;gap:3px;margin-top:5px}
.stars{font-size:9px;color:#FFA000;letter-spacing:.3px}
.rcount{font-size:9px;color:var(--gray);font-weight:600}

.see-more{
  margin-top:5px;
  background:var(--green-lt);
  color:var(--green);font-size:9px;font-weight:700;
  padding:4px 6px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;
}

/* ── MID QUANTITY FILTER ─────────────────────── */
.mid-filter{
  background:linear-gradient(180deg,#FFFBE6 0%,#FFFEF5 100%);
  border-top:1px solid #F5E9A8;
  border-bottom:1px solid #F5E9A8;
  padding:14px 14px 18px;
  margin:14px 0;
}
.mid-title{font-size:14px;color:var(--dark);font-weight:500;margin-bottom:10px}
.mid-title strong{font-weight:800;letter-spacing:-.2px}
.mid-pills{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.mid-pills::-webkit-scrollbar{display:none}
.mpill{
  flex-shrink:0;
  background:white;border:1px solid var(--border);
  font-family:var(--font);font-size:13px;font-weight:600;color:var(--dark);
  padding:7px 18px;border-radius:24px;cursor:pointer;
  transition:all .15s;
}
.mpill.active{background:var(--green);border-color:var(--green);color:white}
.mpill:active{transform:scale(.95)}

/* ── EMPTY STATE ─────────────────────────────── */
.empty{
  display:none;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 24px;text-align:center;
}
.empty.show{display:flex}
.empty-em{font-size:64px;margin-bottom:14px;opacity:.7}
.empty-title{font-size:16px;font-weight:800;color:var(--dark)}
.empty-sub{font-size:13px;color:var(--gray);margin-top:5px;line-height:1.5}
.empty-btn{
  margin-top:18px;
  background:var(--green);color:white;border:none;
  padding:11px 22px;border-radius:10px;
  font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;
}

/* ── BOTTOM SHEET ────────────────────────────── */
.sheet-bg{
  position:absolute;inset:0;background:rgba(0,0,0,.5);
  z-index:300;opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.sheet-bg.show{opacity:1;pointer-events:all}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:white;border-radius:18px 18px 0 0;
  max-height:75%;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:12px auto 14px}
.sheet-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 18px 14px;border-bottom:1px solid var(--border);
}
.sheet-title{font-size:15px;font-weight:800;color:var(--dark)}
.sheet-clear{font-size:12px;font-weight:700;color:var(--green);cursor:pointer}
.sheet-body{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:none}
.sheet-body::-webkit-scrollbar{display:none}

.sheet-opt{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;cursor:pointer;
  transition:background .15s;
}
.sheet-opt:active{background:var(--light)}
.sheet-opt-txt{font-size:13px;font-weight:600;color:var(--dark)}
.sheet-check{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.sheet-check.box{border-radius:5px}
.sheet-opt.selected .sheet-check{background:var(--green);border-color:var(--green)}
.sheet-opt.selected .sheet-check::after{content:'✓';font-size:10px;color:white;font-weight:800}
.sheet-opt.selected .sheet-opt-txt{color:var(--green)}

.sheet-foot{
  flex-shrink:0;padding:12px 18px 24px;
  border-top:1px solid var(--border);
  display:flex;gap:10px;
}
.sheet-cancel{
  flex:1;background:white;border:1.5px solid var(--border);
  padding:12px;border-radius:10px;
  font-family:var(--font);font-size:13px;font-weight:700;color:var(--dark);cursor:pointer;
}
.sheet-apply{
  flex:1;background:var(--green);color:white;border:none;
  padding:12px;border-radius:10px;
  font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;
}

/* PRICE RANGE inputs */
.range-row{display:flex;gap:10px;padding:14px 18px}
.range-input{
  flex:1;background:var(--light);border-radius:10px;padding:10px 12px;
  border:1.5px solid transparent;transition:border-color .15s;
}
.range-input:focus-within{border-color:var(--green);background:white}
.range-input small{font-size:9px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.range-input input{
  border:none;outline:none;background:transparent;width:100%;
  font-family:var(--font);font-size:14px;font-weight:700;color:var(--dark);
  padding:1px 0 0;
}

/* QUICK PRICE CHIPS */
.quick-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 14px}
.qchip{
  background:var(--light);border:1px solid var(--border);
  font-family:var(--font);font-size:11px;font-weight:600;color:var(--dark);
  padding:5px 11px;border-radius:18px;cursor:pointer;
}
.qchip:active{background:var(--green-lt);border-color:var(--green);color:var(--green)}

/* TOAST */
.toast{
  position:absolute;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--dark);color:white;
  font-size:12px;font-weight:600;
  padding:9px 16px;border-radius:20px;
  z-index:60;opacity:0;
  transition:opacity .25s, transform .25s;
  pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV */
.bnav{
  flex-shrink:0;background:white;
  border-top:1px solid var(--border);
  display:flex;padding:6px 0 16px;
  box-shadow:0 -4px 20px rgba(0,0,0,.05);
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.nav-svg{width:20px;height:20px;fill:#9E9E9E;transition:all .2s}
.nav-item.active .nav-svg{fill:var(--green);transform:scale(1.1)}
.nav-item.nav-pick.active .nav-svg{fill:#FF6B00}
.nav-lbl{font-size:9.5px;font-weight:600;color:#9E9E9E}
.nav-item.active .nav-lbl{color:var(--green)}
.nav-item.nav-pick.active .nav-lbl{color:#FF6B00}
</style>
</head>
<body>
<div class="shell" id="shell">

  <!-- SEARCH AREA -->
  <div class="search-area suggesting" id="searchArea">
    <div class="search-row">
      <div class="s-back" onclick="history.back()">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <div class="s-input-wrap">
        <svg class="s-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input class="s-input" id="sInput" type="text" placeholder='Search "atta, dal, coke..."' value="atta">
        <div class="s-clear" id="sClear" onclick="clearSearch()">✕</div>
        <div class="s-divider"></div>
        <div class="s-mic">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
      </div>
    </div>

    <!-- SUGGESTIONS -->
    <div class="suggestions">
      <div class="sugg-list" id="suggList"></div>
    </div>
  </div>

  <!-- FILTER PILLS -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-scroll">
      <div class="filter-row">
        <button class="fpill" onclick="openSheet('filters')">
          <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
          Filters <span id="filtersCount"></span>
        </button>
        <button class="fpill" id="pillSort" onclick="openSheet('sort')">
          <svg viewBox="0 0 24 24"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
          Sort
        </button>
        <button class="fpill" id="pillQty" onclick="openSheet('qty')">
          Quantity <span class="dropchev">▾</span>
        </button>
        <button class="fpill" id="pillPrice" onclick="openSheet('price')">
          Price <span class="dropchev">▾</span>
        </button>
        <button class="fpill" id="pillBrand" onclick="openSheet('brand')">
          Brand <span class="dropchev">▾</span>
        </button>
        <button class="fpill" id="pillRating" onclick="openSheet('rating')">
          Rating <span class="dropchev">▾</span>
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="results-head" id="resultsHead">
      Showing <strong id="resultCount">0</strong> results for <strong id="resultQuery">"atta"</strong>
    </div>
    <div class="prod-grid" id="grid1"></div>
    <div class="mid-filter" id="midFilter">
      <div class="mid-title">Filter by <strong>Quantity</strong></div>
      <div class="mid-pills" id="midPills"></div>
    </div>
    <div class="prod-grid" id="grid2"></div>
    <div class="empty" id="empty">
      <div class="empty-em">🔍</div>
      <div class="empty-title">No results found</div>
      <div class="empty-sub">Try a different search or remove filters</div>
      <button class="empty-btn" onclick="clearAllFilters()">Clear all filters</button>
    </div>
    <div style="height:30px"></div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bnav">
    <div class="nav-item" onclick="setNav(this)">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="nav-lbl">Home</span>
    </div>
    <div class="nav-item active" onclick="setNav(this)">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm0 10c-1.66 0-3-1.34-3-3h2c0 .55.45 1 1 1s1-.45 1-1h2c0 1.66-1.34 3-3 3z"/></svg>
      <span class="nav-lbl">Shop</span>
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 5h2V3c-1.1 0-2 .9-2 2zm0 8h2v-2H3v2zm4 8h2v-2H7v2zM3 9h2V7H3v2zm10-6h-2v2h2V3zm6 0v2h2c0-1.1-.9-2-2-2zM5 21v-2H3c0 1.1.9 2 2 2zm-2-4h2v-2H3v2zM9 3H7v2h2V3zm2 18h2v-2h-2v2zm8-8h2v-2h-2v2zm0 8c1.1 0 2-.9 2-2h-2v2zm0-12h2V7h-2v2zm0 8h2v-2h-2v2zm-4 4h2v-2h-2v2zm0-16h2V3h-2v2z"/></svg>
      <span class="nav-lbl">Category</span>
    </div>
    <div class="nav-item nav-pick" onclick="setNav(this)">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      <span class="nav-lbl">Pick</span>
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-3.87-3.12-6-7.51-6C4.09 8.99 1 11.12 1 14.99v1H16.03v-1z"/></svg>
      <span class="nav-lbl">Restaurants</span>
    </div>
  </nav>

  <!-- SHEET -->
  <div class="sheet-bg" id="sheetBg" onclick="closeSheet()">
    <div class="sheet" id="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div class="sheet-title" id="sheetTitle">Sort by</div>
        <div class="sheet-clear" onclick="clearSheetSelection()">Clear</div>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
      <div class="sheet-foot">
        <button class="sheet-cancel" onclick="closeSheet()">Cancel</button>
        <button class="sheet-apply" onclick="applySheet()">Apply</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">Added</div>

</div><!-- shell -->

<script>
// ══════════════════════════════════════════════
// PRODUCT DATA — atta search results
// ══════════════════════════════════════════════
const PRODUCTS = [
  { id:1, em:'🌾', name:"Aashirvaad Superior MP Atta (100% Atta, 0% Maida) (Godhumai Maavu)", brand:'Aashirvaad', wt:'10 kg', qty:10000, price:549, og:644, off:14, rating:4.4, reviews:'10,782', tag:'No Maida', ad:true, perKg:'₹54.9/kg' },
  { id:2, em:'🌾', name:"Aashirvaad Superior MP Atta - 1 kg (Godhumai Maavu)", brand:'Aashirvaad', wt:'1 kg', qty:1000, price:63, og:74, off:14, rating:4.5, reviews:'25,670', tag:null, ad:false, perKg:'₹63/kg' },
  { id:3, em:'🌾', name:"Aashirvaad Superior MP Atta", brand:'Aashirvaad', wt:'2 kg', qty:2000, price:105, og:116, off:9, rating:4.4, reviews:'7,903', tag:null, ad:false, perKg:'₹52.5/kg' },
  { id:4, em:'🌾', name:"Fortune Chakki Fresh Atta (0% Maida) (Godhumai Maavu)", brand:'Fortune', wt:'1 kg', qty:1000, price:45, og:107, off:58, rating:4.4, reviews:'21,245', tag:'No Maida', ad:false, perKg:'₹45/kg', priceHighlight:true },
  { id:5, em:'🌾', name:"Amul Organic Atta (Whole Wheat)", brand:'Amul', wt:'5 kg', qty:5000, price:283, og:350, off:19, rating:4.3, reviews:'1,190', tag:'Organic', ad:true, perKg:'₹56.6/kg' },
  { id:6, em:'🌾', name:"Aashirvaad Superior MP Atta (100% Atta, 0% Maida) (Godhumai Maavu)", brand:'Aashirvaad', wt:'5 kg', qty:5000, price:307, og:358, off:14, rating:4.5, reviews:'15,384', tag:'No Maida', ad:false, perKg:'₹61.4/kg' },
  { id:7, em:'🌾', name:"Aashirvaad Select 100% MP Sharbati Atta", brand:'Aashirvaad', wt:'5 kg', qty:5000, price:340, og:395, off:14, rating:4.5, reviews:'8,234', tag:'Premium', ad:false, perKg:'₹68/kg' },
  { id:8, em:'🌾', name:"Fortune Chakki Fresh Atta", brand:'Fortune', wt:'5 kg', qty:5000, price:235, og:290, off:19, rating:4.3, reviews:'12,098', tag:null, ad:false, perKg:'₹47/kg' },
  { id:9, em:'🌾', name:"ID Authentic Whole Wheat Atta", brand:'ID', wt:'5 kg', qty:5000, price:268, og:330, off:19, rating:4.2, reviews:'4,567', tag:null, ad:false, perKg:'₹53.6/kg' },
  { id:10, em:'🌾', name:"Pillsbury Chakki Fresh Atta", brand:'Pillsbury', wt:'5 kg', qty:5000, price:275, og:340, off:19, rating:4.4, reviews:'9,876', tag:null, ad:false, perKg:'₹55/kg' },
  { id:11, em:'🌾', name:"Aashirvaad Multigrain Atta", brand:'Aashirvaad', wt:'5 kg', qty:5000, price:385, og:425, off:9, rating:4.6, reviews:'18,432', tag:'Multigrain', ad:false, perKg:'₹77/kg' },
  { id:12, em:'🌾', name:"Aashirvaad Atta with Multigrains", brand:'Aashirvaad', wt:'500 g', qty:500, price:48, og:55, off:13, rating:4.3, reviews:'3,456', tag:null, ad:false, perKg:'₹96/kg' },
];

const SORT_OPTS = [
  {id:'rel',label:'Relevance (default)'},
  {id:'price-asc',label:'Price — Low to High'},
  {id:'price-desc',label:'Price — High to Low'},
  {id:'rating',label:'Rating'},
  {id:'discount',label:'Biggest Discount'},
];
const QTY_OPTS = ['1 kg','5 kg','500 g','10 kg','2 kg','250 g'];
const BRAND_OPTS = ['Aashirvaad','Fortune','Amul','Pillsbury','ID','Sona Masuri'];
const RATING_OPTS = [
  {id:'4plus',label:'4★ & above'},
  {id:'3plus',label:'3★ & above'},
];
const RECENT = ['paneer','milk','dal','soap','rice','tomato'];

// State
let query = 'atta';
let sortBy = 'rel';
let selectedQty = new Set();
let selectedBrands = new Set();
let priceMin = 0, priceMax = 1000;
let ratingFilter = null;
let wished = new Set();
let cart = {};
let currentSheet = null;
let tempSelection = null;

// ══════════════════════════════════════════════
// SUGGESTIONS
// ══════════════════════════════════════════════
function buildSuggestions(q) {
  const list = document.getElementById('suggList');
  if (!q) {
    // Show recent searches
    list.innerHTML = `
      <div class="recent-block">
        <div class="recent-head">
          <div class="recent-title">Recent searches</div>
          <div class="recent-clear">Clear all</div>
        </div>
        <div class="recent-pills">
          ${RECENT.map(r=>`<div class="rpill" onclick="setQuery('${r}')">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            ${r}
          </div>`).join('')}
        </div>
      </div>`;
    return;
  }
  const baseSuggestions = [
    {em:'🌾',text:'atta'},
    {em:'🌾',text:'aashirvaad atta'},
    {em:'🌾',text:'atta 5kg'},
    {em:'🌾',text:'atta 10kg'},
    {em:'💪',text:'protein atta'},
    {em:'🌾',text:'multigrain atta'},
    {em:'🌾',text:'fortune atta'},
  ];
  const matched = baseSuggestions.filter(s => s.text.toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if (!matched.length) {
    list.innerHTML = `<div style="padding:30px 18px;text-align:center;color:var(--gray);font-size:13px">No suggestions found.<br>Press enter to search "${q}"</div>`;
    return;
  }
  list.innerHTML = matched.map(s => {
    const lower = s.text.toLowerCase(), ql = q.toLowerCase();
    const idx = lower.indexOf(ql);
    let html;
    if (idx === -1) html = `<strong>${s.text}</strong>`;
    else html = `<strong>${s.text.slice(0,idx)}</strong>${s.text.slice(idx,idx+q.length)}<strong>${s.text.slice(idx+q.length)}</strong>`;
    return `<div class="sugg-item" onclick="setQuery('${s.text}')">
      <div class="sugg-img">${s.em}</div>
      <div class="sugg-text">${html}</div>
      <div class="sugg-arr">↗</div>
    </div>`;
  }).join('');
}

function setQuery(q) {
  document.getElementById('sInput').value = q;
  query = q;
  document.getElementById('searchArea').classList.remove('suggesting');
  document.getElementById('sInput').blur();
  document.getElementById('resultQuery').textContent = `"${q}"`;
  renderResults();
}

function clearSearch() {
  const input = document.getElementById('sInput');
  input.value = '';
  query = '';
  document.getElementById('sClear').classList.add('hide');
  document.getElementById('searchArea').classList.add('suggesting');
  buildSuggestions('');
  input.focus();
}

document.getElementById('sInput').addEventListener('focus', () => {
  document.getElementById('searchArea').classList.add('suggesting');
});
document.getElementById('sInput').addEventListener('input', function() {
  query = this.value;
  document.getElementById('sClear').classList.toggle('hide', !query);
  buildSuggestions(query);
  renderResults();
});
document.getElementById('sInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    setQuery(this.value);
  }
});
// Tap outside suggestions hides them
document.getElementById('main').addEventListener('click', () => {
  document.getElementById('searchArea').classList.remove('suggesting');
  document.getElementById('sInput').blur();
});

// ══════════════════════════════════════════════
// RESULTS
// ══════════════════════════════════════════════
function getFilteredProducts() {
  let list = [...PRODUCTS];
  if (query) {
    const q = query.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.brand.toLowerCase().includes(q) ||
      (p.tag && p.tag.toLowerCase().includes(q))
    );
  }
  if (selectedQty.size) list = list.filter(p => selectedQty.has(p.wt));
  if (selectedBrands.size) list = list.filter(p => selectedBrands.has(p.brand));
  list = list.filter(p => p.price >= priceMin && p.price <= priceMax);
  if (ratingFilter === '4plus') list = list.filter(p => p.rating >= 4);
  if (ratingFilter === '3plus') list = list.filter(p => p.rating >= 3);

  if (sortBy === 'price-asc') list.sort((a,b) => a.price - b.price);
  if (sortBy === 'price-desc') list.sort((a,b) => b.price - a.price);
  if (sortBy === 'rating') list.sort((a,b) => b.rating - a.rating);
  if (sortBy === 'discount') list.sort((a,b) => b.off - a.off);

  return list;
}

function buildCard(p) {
  const stars = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5-Math.round(p.rating));
  const isWish = wished.has(p.id);
  return `<div class="pcard">
    <div class="pcard-img">
      ${p.ad ? '<div class="ad-tag">Ad</div>' : ''}
      <div class="wish${isWish?' on':''}" onclick="toggleWish(event,${p.id})">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </div>
      <div class="pcard-em">${p.em}</div>
      <div class="veg-dot"></div>
      <div class="img-bottom">
        <div class="pcard-wt">${p.wt}</div>
        <button class="add-btn" onclick="addToCart(event,${p.id},this)">ADD</button>
      </div>
    </div>
    <div class="pcard-body">
      <div class="pcard-pkg">${p.perKg}</div>
      <div class="pcard-price-row">
        <span class="pcard-price${p.priceHighlight?'':' no-bg'}">₹${p.price}</span>
        ${p.og?`<span class="pcard-og">₹${p.og}</span>`:''}
      </div>
      ${p.off>0?`<div class="pcard-off">${p.off}% OFF on MRP</div>`:''}
      <div class="pcard-name">${p.name}</div>
      ${p.tag?`<div class="pcard-tag">${p.tag}</div>`:''}
      <div class="pcard-rating">
        <span class="stars">${stars.slice(0,5)}</span>
        <span class="rcount">${p.reviews}</span>
      </div>
      <div class="see-more" onclick="showToast('Showing similar products')">See more like this ▸</div>
    </div>
  </div>`;
}

function renderResults() {
  const list = getFilteredProducts();
  document.getElementById('resultCount').textContent = list.length;
  document.getElementById('resultQuery').textContent = `"${query || 'all'}"`;

  const empty = document.getElementById('empty');
  const g1 = document.getElementById('grid1');
  const g2 = document.getElementById('grid2');
  const mid = document.getElementById('midFilter');

  if (!list.length) {
    g1.innerHTML = ''; g2.innerHTML = ''; mid.style.display = 'none';
    empty.classList.add('show');
    return;
  }
  empty.classList.remove('show');

  // Split: first 6 in grid1, rest in grid2; show mid filter only if there are >=6
  const splitAt = Math.min(6, list.length);
  g1.innerHTML = list.slice(0,splitAt).map(buildCard).join('');
  g2.innerHTML = list.slice(splitAt).map(buildCard).join('');
  mid.style.display = list.length > 6 ? '' : 'none';

  // Mid pills
  const mp = document.getElementById('midPills');
  mp.innerHTML = QTY_OPTS.map(q =>
    `<div class="mpill${selectedQty.has(q)?' active':''}" onclick="toggleQty('${q}')">${q}</div>`
  ).join('');

  updatePillStates();
}

function toggleQty(q) {
  if (selectedQty.has(q)) selectedQty.delete(q);
  else selectedQty.add(q);
  renderResults();
}

// ══════════════════════════════════════════════
// PILL STATES
// ══════════════════════════════════════════════
function updatePillStates() {
  document.getElementById('pillSort').classList.toggle('active', sortBy !== 'rel');
  document.getElementById('pillQty').classList.toggle('active', selectedQty.size > 0);
  document.getElementById('pillPrice').classList.toggle('active', priceMin > 0 || priceMax < 1000);
  document.getElementById('pillBrand').classList.toggle('active', selectedBrands.size > 0);
  document.getElementById('pillRating').classList.toggle('active', !!ratingFilter);

  const filtersTotal =
    (sortBy !== 'rel' ? 1 : 0) +
    selectedQty.size +
    selectedBrands.size +
    (priceMin > 0 || priceMax < 1000 ? 1 : 0) +
    (ratingFilter ? 1 : 0);
  const filtersBadge = document.getElementById('filtersCount');
  filtersBadge.innerHTML = filtersTotal ? `<span class="fbadge">${filtersTotal}</span>` : '';

  // Show selection in pill labels
  document.getElementById('pillQty').firstChild.textContent = selectedQty.size
    ? `Qty: ${[...selectedQty].slice(0,1).join(',')}${selectedQty.size>1?` +${selectedQty.size-1}`:''} `
    : 'Quantity ';
  document.getElementById('pillBrand').firstChild.textContent = selectedBrands.size
    ? `${[...selectedBrands].slice(0,1).join(',')}${selectedBrands.size>1?` +${selectedBrands.size-1}`:''} `
    : 'Brand ';
}

// ══════════════════════════════════════════════
// SHEETS
// ══════════════════════════════════════════════
function openSheet(type) {
  currentSheet = type;
  const title = document.getElementById('sheetTitle');
  const body = document.getElementById('sheetBody');

  if (type === 'sort') {
    title.textContent = 'Sort by';
    tempSelection = sortBy;
    body.innerHTML = SORT_OPTS.map(o =>
      `<div class="sheet-opt${o.id===tempSelection?' selected':''}" data-id="${o.id}" onclick="pickSingle(this)">
        <span class="sheet-opt-txt">${o.label}</span><div class="sheet-check"></div>
      </div>`).join('');
  }
  else if (type === 'qty') {
    title.textContent = 'Filter by Quantity';
    tempSelection = new Set(selectedQty);
    body.innerHTML = QTY_OPTS.map(q =>
      `<div class="sheet-opt${tempSelection.has(q)?' selected':''}" data-id="${q}" onclick="pickMulti(this)">
        <span class="sheet-opt-txt">${q}</span><div class="sheet-check box"></div>
      </div>`).join('');
  }
  else if (type === 'price') {
    title.textContent = 'Filter by Price';
    tempSelection = { min: priceMin, max: priceMax };
    body.innerHTML = `
      <div class="range-row">
        <div class="range-input">
          <small>Min ₹</small>
          <input type="number" id="pmin" value="${priceMin}" placeholder="0">
        </div>
        <div class="range-input">
          <small>Max ₹</small>
          <input type="number" id="pmax" value="${priceMax}" placeholder="1000">
        </div>
      </div>
      <div class="quick-chips">
        <div class="qchip" onclick="setPriceRange(0,50)">Under ₹50</div>
        <div class="qchip" onclick="setPriceRange(0,100)">Under ₹100</div>
        <div class="qchip" onclick="setPriceRange(100,300)">₹100–300</div>
        <div class="qchip" onclick="setPriceRange(300,600)">₹300–600</div>
        <div class="qchip" onclick="setPriceRange(600,1000)">₹600+</div>
      </div>`;
  }
  else if (type === 'brand') {
    title.textContent = 'Filter by Brand';
    tempSelection = new Set(selectedBrands);
    body.innerHTML = BRAND_OPTS.map(b =>
      `<div class="sheet-opt${tempSelection.has(b)?' selected':''}" data-id="${b}" onclick="pickMulti(this)">
        <span class="sheet-opt-txt">${b}</span><div class="sheet-check box"></div>
      </div>`).join('');
  }
  else if (type === 'rating') {
    title.textContent = 'Filter by Rating';
    tempSelection = ratingFilter;
    body.innerHTML = RATING_OPTS.map(o =>
      `<div class="sheet-opt${o.id===tempSelection?' selected':''}" data-id="${o.id}" onclick="pickSingle(this)">
        <span class="sheet-opt-txt">${o.label}</span><div class="sheet-check"></div>
      </div>`).join('');
  }
  else if (type === 'filters') {
    title.textContent = 'All Filters';
    body.innerHTML = `
      <div style="padding:14px 18px 6px;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px">Quantity</div>
      ${QTY_OPTS.map(q =>`<div class="sheet-opt${selectedQty.has(q)?' selected':''}" data-id="${q}" onclick="pickMultiPersist(this,'qty')">
        <span class="sheet-opt-txt">${q}</span><div class="sheet-check box"></div>
      </div>`).join('')}
      <div style="padding:14px 18px 6px;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;border-top:1px solid var(--border);margin-top:10px">Brand</div>
      ${BRAND_OPTS.map(b =>`<div class="sheet-opt${selectedBrands.has(b)?' selected':''}" data-id="${b}" onclick="pickMultiPersist(this,'brand')">
        <span class="sheet-opt-txt">${b}</span><div class="sheet-check box"></div>
      </div>`).join('')}
      <div style="padding:14px 18px 6px;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;border-top:1px solid var(--border);margin-top:10px">Rating</div>
      ${RATING_OPTS.map(o =>`<div class="sheet-opt${o.id===ratingFilter?' selected':''}" data-id="${o.id}" onclick="pickSinglePersist(this,'rating')">
        <span class="sheet-opt-txt">${o.label}</span><div class="sheet-check"></div>
      </div>`).join('')}`;
  }

  document.getElementById('sheetBg').classList.add('show');
  document.getElementById('sheet').classList.add('open');
}

function pickSingle(el) {
  el.parentElement.querySelectorAll('.sheet-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  tempSelection = el.dataset.id;
}
function pickMulti(el) {
  const id = el.dataset.id;
  if (tempSelection.has(id)) { tempSelection.delete(id); el.classList.remove('selected'); }
  else { tempSelection.add(id); el.classList.add('selected'); }
}
function pickSinglePersist(el, type) {
  // For all-filters sheet — applies immediately
  el.parentElement.querySelectorAll('.sheet-opt').forEach(o => {
    if (o.dataset.id !== el.dataset.id) o.classList.remove('selected');
  });
  el.classList.toggle('selected');
  if (type === 'rating') ratingFilter = el.classList.contains('selected') ? el.dataset.id : null;
  renderResults();
}
function pickMultiPersist(el, type) {
  const id = el.dataset.id;
  el.classList.toggle('selected');
  const set = type === 'qty' ? selectedQty : selectedBrands;
  if (set.has(id)) set.delete(id); else set.add(id);
  renderResults();
}

function setPriceRange(lo, hi) {
  document.getElementById('pmin').value = lo;
  document.getElementById('pmax').value = hi;
  tempSelection = { min: lo, max: hi };
}

function applySheet() {
  if (currentSheet === 'sort') sortBy = tempSelection;
  if (currentSheet === 'qty') selectedQty = tempSelection;
  if (currentSheet === 'brand') selectedBrands = tempSelection;
  if (currentSheet === 'rating') ratingFilter = tempSelection;
  if (currentSheet === 'price') {
    priceMin = parseInt(document.getElementById('pmin').value) || 0;
    priceMax = parseInt(document.getElementById('pmax').value) || 1000;
  }
  closeSheet();
  renderResults();
}

function clearSheetSelection() {
  if (currentSheet === 'sort') tempSelection = 'rel';
  if (currentSheet === 'qty') tempSelection = new Set();
  if (currentSheet === 'brand') tempSelection = new Set();
  if (currentSheet === 'rating') tempSelection = null;
  if (currentSheet === 'price') {
    document.getElementById('pmin').value = 0;
    document.getElementById('pmax').value = 1000;
    tempSelection = { min:0, max:1000 };
  }
  if (currentSheet === 'filters') {
    selectedQty = new Set(); selectedBrands = new Set(); ratingFilter = null;
    closeSheet(); renderResults(); return;
  }
  // Re-render sheet body
  openSheet(currentSheet);
}

function closeSheet() {
  document.getElementById('sheetBg').classList.remove('show');
  document.getElementById('sheet').classList.remove('open');
}

function clearAllFilters() {
  sortBy = 'rel'; selectedQty.clear(); selectedBrands.clear();
  priceMin = 0; priceMax = 1000; ratingFilter = null;
  renderResults();
}

// ══════════════════════════════════════════════
// CART, WISHLIST, NAV, TOAST
// ══════════════════════════════════════════════
function addToCart(e, id, btn) {
  e.stopPropagation();
  cart[id] = (cart[id]||0) + 1;
  btn.textContent = '✓ ADDED'; btn.classList.add('added');
  showToast('✓ Added to cart');
  setTimeout(() => { btn.textContent = 'ADD'; btn.classList.remove('added'); }, 1200);
}

function toggleWish(e, id) {
  e.stopPropagation();
  if (wished.has(id)) wished.delete(id); else wished.add(id);
  renderResults();
}

function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1400);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
buildSuggestions(query);
renderResults();
</script>
